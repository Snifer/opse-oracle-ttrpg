name: Dev prerelease
on:
  push:
    branches:
      - dev

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Lint con reglas de Obsidian (bloquea si hay errores)
  # ────────────────────────────────────────────────────────────
  lint:
    name: ESLint Obsidian check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (solo reglas obsidian)
        id: eslint
        run: |
          set +e
          npx eslint src --rule 'obsidian/no-constructor-dep: error' \
                         --rule 'obsidian/no-deprecated-components: error' \
                         -f json -o eslint-report.json
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          set -e
          exit $EXIT_CODE

      # Sube el reporte como artefacto para que el job siguiente lo lea
      - name: Upload ESLint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report-dev
          path: eslint-report.json
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # JOB 2: Crea issue de incompatibilidad si el lint falla
  # ────────────────────────────────────────────────────────────
  report-lint-failure:
    name: Create incompatibility issue
    needs: lint
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ESLint report
        uses: actions/download-artifact@v4
        with:
          name: eslint-report-dev

      - name: Format lint report as markdown
        id: format
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python3 - <<'EOF'
          import json, os

          with open("eslint-report.json") as f:
              data = json.load(f)

          lines = []
          lines.append("## Incompatibilidad detectada por ESLint (Obsidian plugin)")
          lines.append("")
          lines.append(f"| Campo | Valor |")
          lines.append(f"|---|---|")
          lines.append(f"| **Rama** | `" + os.environ.get('BRANCH','') + "` |")
          lines.append(f"| **Commit** | `" + os.environ.get('COMMIT_SHA','') + "` |")
          lines.append(f"| **Autor** | @" + os.environ.get('ACTOR','') + " |")
          lines.append(f"| **Workflow run** | [Ver logs](" + os.environ.get('RUN_URL','') + ") |")
          lines.append("")
          lines.append("### Errores encontrados")
          lines.append("")

          total = 0
          for file_result in data:
              rel_path = file_result["filePath"].replace(os.getcwd(), "").lstrip("/")
              for msg in file_result.get("messages", []):
                  if msg.get("severity", 0) >= 2:  # solo errors
                      rule = msg.get("ruleId", "unknown")
                      if rule and rule.startswith("obsidian/"):
                          lines.append(f"- `{rel_path}` **L{msg['line']}:{msg['column']}** — `{rule}`")
                          lines.append(f"  > {msg['message']}")
                          lines.append("")
                          total += 1

          if total == 0:
              lines.append("_No se encontraron errores de reglas Obsidian en el reporte._")

          lines.append("")
          lines.append("---")
          lines.append("> Este issue fue creado automáticamente por el workflow de lint. Corrige los errores y vuelve a hacer push a `dev`.")

          with open("issue-body.md", "w") as out:
              out.write("\n".join(lines))
          EOF
        env:
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create GitHub issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[Incompatibilidad Obsidian] ESLint fallo en dev @ ${{ github.sha }}"
          content-filepath: ./issue-body.md
          labels: |
            bug
            incompatibility
            obsidian-api
            dev

  # ────────────────────────────────────────────────────────────
  # JOB 3: Prerelease (solo corre si el lint paso OK)
  # ────────────────────────────────────────────────────────────
  prerelease:
    name: Dev prerelease
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 1) Bump version patch y añadir sufijo -dev => 0.0.1-dev, 0.0.2-dev, etc.
      - name: Bump prerelease version
        id: bump
        run: |
          # Sube el patch en package.json sin tag git (ej: 0.0.1 -> 0.0.2)
          BASE_VERSION=$(npm version patch --no-git-tag-version)
          BASE_VERSION=${BASE_VERSION#v}
          NEW_VERSION="${BASE_VERSION}-dev"
          # Sobrescribe package.json con la version -dev
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${NEW_VERSION}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      # 2) Sincronizar manifest.json con la nueva version
      - name: Sync version to manifest.json
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          jq ".version = \"${VERSION}\"" manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      # 3) Commit de version
      - name: Commit version bump
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git add package.json package-lock.json manifest.json || true
          git commit -m "chore: bump dev version to ${VERSION}" || echo "No changes to commit"

      # 4) Tag (borra el tag local y remoto si ya existe, luego lo recrea)
      - name: Create tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          TAG="${VERSION}"
          # Si ya existe localmente, borralo
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag -d "${TAG}"
          fi
          # Si ya existe en remoto, borralo
          if git ls-remote --tags origin "${TAG}" | grep "${TAG}" >/dev/null 2>&1; then
            git push origin ":refs/tags/${TAG}"
          fi
          # Crear y pushear el tag limpio
          git tag "${TAG}"
          git push origin "${TAG}"

      # 5) Build plugin
      - name: Build plugin
        run: |
          npm install
          npm run build

      # 6) Crear prerelease en GitHub
      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: "Dev ${{ steps.bump.outputs.version }}"
          prerelease: true
          draft: false
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
